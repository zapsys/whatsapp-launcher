<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Launcher</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <!-- Favicon padrão -->
  <link rel="icon" href="icons/favicon.ico" sizes="any">

  <!-- PNGs modernos -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/logo-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/logo-512x512.png">

  <!-- iOS -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

</head>

<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">

<div class="card shadow-lg border-0 rounded-4 p-4 text-center" style="width: 340px;">
  
  <!-- Ícone corrigido (proporcional) -->
  <div class="mb-3">
    <img 
      src="icons/whatsapp.svg"
      alt="WhatsApp"
      width="64"
      height="64"
      class="img-fluid"
    >
  </div>

  <h5 class="fw-semibold mb-1">Abrir conversa</h5>
  <p class="text-body-secondary small mb-3">Digite o número com DDD</p>

  <input 
    id="telefone" 
    class="form-control form-control-lg text-center"
    placeholder="(99) 99999-9999"
  >

  <button 
    class="btn btn-success btn-lg w-100 mt-3"
    onclick="abrirWhats()"
  >
    Abrir no WhatsApp
  </button>

  <div id="msg" class="text-body-secondary small mt-3"></div>

</div>

<script>
  const input = document.getElementById('telefone');
  const msg = document.getElementById('msg');

  input.addEventListener('input', () => {
    let v = input.value.replace(/\D/g, '');

    if (v.length > 11) v = v.slice(0, 11);

    if (v.length > 6) {
      v = v.replace(/(\d{2})(\d{5})(\d+)/, '($1) $2-$3');
    } else if (v.length > 2) {
      v = v.replace(/(\d{2})(\d+)/, '($1) $2');
    }

    input.value = v;
  });

  function detectarMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function abrirWhats() {
    let numero = input.value.replace(/\D/g, '');

    if (!numero.startsWith('55')) {
      numero = '55' + numero;
    }

    if (numero.length < 12) {
      msg.innerText = 'Número inválido';
      msg.classList.add('text-danger');
      return;
    }

    msg.classList.remove('text-danger');
    msg.innerText = 'Abrindo...';

    const texto = encodeURIComponent("Olá!");
    let url = detectarMobile()
      ? `https://wa.me/${numero}?text=${texto}`
      : `https://web.whatsapp.com/send?phone=${numero}&text=${texto}`;

    window.open(url, '_blank');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
