<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Inicia chats do WhatsApp instantemente após adicionar um número de telefone. Um modo rápido, simples e eficiente para iniciar conversas.">
  <meta name="author" content="Zapwebsites">
  <!-- Open Graph -->
  <meta property="og:title" content="WhatsApp Launcher">
  <meta property="og:description" content="Inicie conversas no WhatsApp rapidamente sem salvar o número. Simples, rápido e direto.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://whats-launcher.vercel.app">
  <meta property="og:image" content="https://whats-launcher.vercel.app/icons/logo-512x512.png">
  <!-- Melhor compatibilidade -->
  <meta property="og:locale" content="pt_BR">
  <meta property="og:site_name" content="WhatsApp Launcher">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="WhatsApp Launcher">
  <meta name="twitter:description" content="Inicie conversas no WhatsApp rapidamente sem salvar o número.">
  <meta name="twitter:image" content="https://whats-launcher.vercel.app/icons/logo-512x512.png">
  <title>WhatsApp Launcher</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <!-- Favicon padrão -->
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <!-- PNGs modernos -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/logo-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/logo-512x512.png">
  <!-- iOS -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">
  <div class="card shadow-lg border-0 rounded-4 p-4 text-center" style="width: 340px;">
    <!-- Ícone corrigido (proporcional) -->
    <div class="mb-3">
      <img src="icons/whatsapp.svg" alt="WhatsApp" width="64" height="64" class="img-fluid">
    </div>
    <h5 class="fw-semibold mb-1">Iniciar conversa</h5>
    <p class="text-body-secondary small mb-3">Digite o número com DDD</p>
    <input id="telefone" class="form-control form-control-lg text-center" placeholder="(99) 99999-9999">
    <button id="btnAbrir" class="btn btn-success btn-lg w-100 mt-3">
      Abrir WhatsApp
    </button>
    <div id="msg" class="text-body-secondary small mt-3"></div>
  </div>
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="installToast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body">
          📲 Instale este app para acesso rápido
        </div>
        <button type="button" class="btn btn-sm btn-outline-light me-2 m-auto" id="installAction">
          Instalar
        </button>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script personalizado -->
  <script src="js/app.js"></script>
</body>
</html>
